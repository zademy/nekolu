# Spring Boot application name
spring.application.name=nekolu

# --- Telegram API credentials ---
# Application ID from https://my.telegram.org (override with TELEGRAM_API_ID if needed)
telegram.api.id=${TELEGRAM_API_ID::your_default_api_id}
# Application hash from https://my.telegram.org (override with TELEGRAM_API_HASH if needed)
telegram.api.hash=${TELEGRAM_API_HASH:your_default_api_hash}
# Numeric Telegram user ID that owns the shared TDLib session (used to identify Saved Messages)
telegram.user.id=${TELEGRAM_USER_ID:your_numeric_user_id}

# --- TDLib directories ---
# Directory where TDLib stores its SQLite database (session, messages, and chats)
telegram.database-directory=./tdlib
# Directory where TDLib stores local files managed by the application
telegram.files-directory=./tdlib

# --- TDLib system metadata ---
# Reported system language code (ISO 639-1 format, for example: en, es, fr)
telegram.system.language-code=en
# Device model reported to Telegram for the active session list
telegram.system.device-model=Spring Boot Server
# Operating system version reported to Telegram
telegram.system.version=1.0

# --- Application metadata ---
# Application version reported to Telegram
telegram.app.version=1.0

# --- TDLib feature flags ---
# Use Telegram test data centers (true only for dedicated development or test accounts)
telegram.use-test-dc=false
# Enable support for secret chats
telegram.use-secret-chats=false
# Enable TDLib message database (required for file discovery and history searches)
telegram.use-message-database=true
# Enable TDLib chat metadata database (chat names, photos, membership, and related metadata)
telegram.use-chat-info-database=true
# Enable TDLib file database (download tracking and local file references)
telegram.use-file-database=true

# --- Asynchronous request configuration ---
# Timeout for asynchronous MVC requests in milliseconds (300000 = 5 minutes)
spring.mvc.async.request-timeout=300000

# --- Multipart upload limits ---
# Maximum size for a single uploaded file (2 GB matches the standard Telegram limit for regular accounts)
spring.servlet.multipart.max-file-size=2GB
# Maximum size for the full multipart request
spring.servlet.multipart.max-request-size=2GB
# Enable multipart upload support
spring.servlet.multipart.enabled=true
